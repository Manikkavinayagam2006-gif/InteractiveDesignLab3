<section class="section contact-section">
    <h2>Contact Us</h2>
    <div class="contact-container">
        <form id="contactForm" onsubmit="return submitForm(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" required placeholder="+91 XXXXXXXXXX">
            </div>
            <div class="form-group">
                <label>Your Message</label>
                <textarea id="message" rows="5" required placeholder="Write your query..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message 📨</button>
        </form>
        <p id="formStatus" style="text-align:center; margin-top:20px; font-weight:bold;"></p>
    </div>
</section>
